
<!-- ===== CONTACT SECTION ===== -->

<!-- To update: Modify contact info, social links, or form fields -->

<section class="contact-section" id="contact">
    <div class="container">
        <div class="section-header">
            <span class="section-badge">Get In Touch</span>
            <h2 class="section-title">Contact <span class="gradient-text">Us</span></h2>
            <p class="section-subtitle">Have questions? We'd love to hear from you!</p>
        </div>
        <div class="contact-wrapper">
            <div class="contact-info">
                <!-- Email Card -->
                <div class="info-card">
                    <div class="info-icon">
                        <i class="fas fa-envelope"></i>
                    </div>
                    <div class="info-content">
                        <h4>Email Us</h4>
                        <p>contact.us.RapidFast@gmail.com</p>
                    </div>
                </div>
                
                <!-- Location Card -->
                <div class="info-card">
                    <div class="info-icon">
                        <i class="fas fa-map-marker-alt"></i>
                    </div>
                    <div class="info-content">
                        <h4>Visit Us</h4>
                        <p>Bangalore, India</p>
                    </div>
                </div>
                
                <!-- WhatsApp Channel -->
                <a href="https://whatsapp.com/channel/0029Vb7OqCF3QxS6oVWKm83a" target="_blank" rel="noopener noreferrer"
                    class="whatsapp-follow-btn">
                    <i class="fab fa-whatsapp"></i>
                    <span>Follow on WhatsApp for Updates!</span>
                </a>
                <div class="social-links">
                    <a href="https://whatsapp.com/channel/0029Vb7OqCF3QxS6oVWKm83a" target="_blank" rel="noopener noreferrer" class="social-link" aria-label="WhatsApp"><i class="fab fa-whatsapp"></i></a>
                </div>
            </div>
            
            <!-- Contact Form -->
            <form class="contact-form" id="contact-form">
                <div class="form-row">
                    <div class="form-group">
                        <input type="text" placeholder="Your Name" required>
                    </div>
                    <div class="form-group">
                        <input type="email" placeholder="Your Email" required>
                    </div>
                </div>
                <div class="form-group">
                    <input type="text" placeholder="Subject">
                </div>
                <div class="form-group">
                    <textarea placeholder="Your Message" rows="5" required></textarea>
                </div>
                <button type="submit" class="btn btn-primary">
                    Send Message <i class="fas fa-paper-plane"></i>
                </button>
            </form>
        </div>
    </div>
</section>
